name: Florida

on:
  schedule:
    - cron: "0 9/12 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "ci"]
    paths:
      - ".github/workflows/build.yml"
      - "patches/**"

jobs: 
  check_version:
    runs-on: ubuntu-22.04

    outputs:
      FRIDA_VERSION: ${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}
      ALREADY_RELEASE: ${{ steps.checkReleaseVersion.outputs.ALREADY_RELEASE }}
    steps:
      - name: Pull Frida Latest Release
        id: pullFridaLatestRelease
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const releaseResponse = await github.rest.repos.getLatestRelease({
              owner: 'frida',
              repo: 'frida',
            })
            const {
              data: { tag_name: ver }
            } = releaseResponse;
            core.setOutput('FRIDA_VERSION', ver);

      - name: Split Repository Name
        id: split_name
        run: |
          repo_name=${{ github.repository }}
          IFS='/' read -ra repo_parts <<< "$repo_name"
          echo "owner=${repo_parts[0]}" >> $GITHUB_OUTPUT
          echo "repo=${repo_parts[1]}" >> $GITHUB_OUTPUT

      - name: Check release version
        id: checkReleaseVersion
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            try {
              const releaseVersion = '${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}'
              const releaseResponse = await github.rest.repos.getReleaseByTag({
                owner: '${{ steps.split_name.outputs.owner }}',
                repo: '${{ steps.split_name.outputs.repo }}',
                tag: releaseVersion
              });
              const {
                data: { tag_name: ver }
              } = releaseResponse;
              if (ver == '${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}'){
                  if ( ${{ ( github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}){
                    core.setOutput('ALREADY_RELEASE', '2');
                  } else {
                    core.setOutput('ALREADY_RELEASE', '1');
                  }
              }
              else{
                  core.setOutput('ALREADY_RELEASE', '0');
              }
            } catch (e) {
              if(e.message == 'Not Found'){
                core.setOutput('ALREADY_RELEASE', '0');
              }
              else{
                core.setFailed(e.message);
              }
            }
      
      - name: Delete release
        if: ${{ steps.checkReleaseVersion.outputs.ALREADY_RELEASE == '2' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete ${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }} --repo ${{ github.repository }} --yes --cleanup-tag

  create_release:
    needs: check_version
    runs-on: ubuntu-22.04
    if: needs.check_version.outputs.ALREADY_RELEASE != '1'

    steps:
      - uses: softprops/action-gh-release@v2.1.0
        id: createRelease
        name: Create Runner Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
          name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
          prerelease: false

  android_build:
    runs-on: ubuntu-22.04
    needs: [check_version, create_release]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r29
        local-cache: false
        link-to-sdk: true

    - name: Verify NDK installation
      run: |
        NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
        echo "NDK path from setup-ndk: $NDK_PATH"
        if [ -z "$NDK_PATH" ]; then
          echo "ERROR: setup-ndk output ndk-path is empty!"
          exit 1
        fi
        if [ ! -f "$NDK_PATH/source.properties" ]; then
          echo "ERROR: source.properties not found at $NDK_PATH"
          ls -la "$NDK_PATH" || true
          exit 1
        fi
        echo "NDK source.properties content:"
        cat "$NDK_PATH/source.properties"
        NDK_VERSION=$(grep "Pkg.Revision" "$NDK_PATH/source.properties" | cut -d'=' -f2 | tr -d ' ' | cut -d'.' -f1)
        echo "Detected NDK major version: $NDK_VERSION"
        if [ "$NDK_VERSION" != "29" ]; then
          echo "ERROR: Expected NDK r29 but found r$NDK_VERSION"
          exit 1
        fi
        echo "NDK r29 verified successfully."

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: install dependencies
      run: |
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-11-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 -y
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief

    - name: build frida for Android
      shell: bash
      env:
        ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
        
        git clone --recurse-submodules --branch ${{ needs.check_version.outputs.FRIDA_VERSION }} https://github.com/frida/frida
        cd frida
        for path in ../patches/*
        do
          name=$(basename $path)
          real=$(realpath $path)
          echo "Apply patches in $real to frida/subprojects/$name"
          cd subprojects/$name
          git am ../../../patches/$name/*.patch
          cd ../..
          echo $i
        done
        cd ..
    
        # Rebuild helper.dex after patches renamed Java package (re.frida -> re.fc)
        # IMPORTANT: Must use a low API level android.jar (matching upstream default of API 19/21)
        # to avoid SecurityException on Android 15. The upstream pre-built helper.dex is compiled
        # with android-19; using a high API level (35/36) causes d8/javac to produce dex bytecode
        # that behaves differently at runtime (e.g. ActivityThread.systemMain() path changes).
        echo "Rebuilding helper.dex..."
        cd frida/subprojects/frida-core/src/android-helper
        # Add Android SDK build-tools to PATH for d8
        BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -n1)
        export PATH="$BUILD_TOOLS_DIR:$PATH"
        echo "Using build-tools from: $BUILD_TOOLS_DIR"
        echo "d8 location: $(which d8)"
        # Install android-21 platform if not present (upstream uses API 19, but 21 is the minimum
        # available via sdkmanager and sufficient for ART-based helper)
        HELPER_API_LEVEL=21
        if [ ! -f "$ANDROID_HOME/platforms/android-${HELPER_API_LEVEL}/android.jar" ]; then
          echo "Installing android-${HELPER_API_LEVEL} platform..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-${HELPER_API_LEVEL}" || \
          yes | $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-${HELPER_API_LEVEL}" || true
        fi
        ANDROID_JAR="$ANDROID_HOME/platforms/android-${HELPER_API_LEVEL}/android.jar"
        if [ ! -f "$ANDROID_JAR" ]; then
          echo "ERROR: Failed to install android-${HELPER_API_LEVEL} platform, android.jar not found"
          echo "Available platforms:"
          ls $ANDROID_HOME/platforms/
          exit 1
        fi
        echo "Using android.jar: $ANDROID_JAR (API level ${HELPER_API_LEVEL})"
        mkdir -p build/java
        make android_jar="$ANDROID_JAR"
        echo "helper.dex rebuilt successfully (size: $(stat -c%s helper.dex 2>/dev/null || stat -f%z helper.dex) bytes)"
        cd ../../../../..
      
        ARCHES="android-arm android-arm64 android-x86 android-x86_64"
        for ARCH in $ARCHES
        do
          mkdir build-$ARCH
          cd build-$ARCH
          ../frida/configure --host=$ARCH
          make
          cd ..
        done
    
    - name: package build result for Android
      shell: bash
      run: |
        FRIDA_VERSION="${{ needs.check_version.outputs.FRIDA_VERSION }}"
        mkdir -p release-assets
        
        ARCHES="android-arm android-arm64 android-x86 android-x86_64"
        for ARCH in $ARCHES
        do
          gzip -c build-$ARCH/subprojects/frida-core/server/frida-server > release-assets/florida-server-${FRIDA_VERSION}-${ARCH}.gz
          gzip -c build-$ARCH/subprojects/frida-core/inject/frida-inject > release-assets/florida-inject-${FRIDA_VERSION}-${ARCH}.gz
          gzip -c build-$ARCH/subprojects/frida-core/lib/gadget/frida-gadget.so > release-assets/florida-gadget-${FRIDA_VERSION}-${ARCH}.so.gz
          gzip -c build-$ARCH/subprojects/frida-gum/bindings/gumjs/libfrida-gumjs-1.0.a > release-assets/florida-gumjs-${FRIDA_VERSION}-${ARCH}.a.gz
        done
        
        ls -la release-assets/

    - name: Upload build artifacts to release
      uses: softprops/action-gh-release@v2.1.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
        files: release-assets/*